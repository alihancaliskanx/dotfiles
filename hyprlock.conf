general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

background {
    monitor =
    # Taşınabilir: masaüstünün bulanık anlık görüntüsü (her makinede çalışır).
    # Sabit bir görsel istersen: path = $HOME/.config/omarchy/current/background
    path = screenshot
    color = rgba(16, 16, 16, 1.0)
    blur_passes = 2 # Hafif bulanıklık için
    blur_size = 7
}

# --- SAAT (Üst Kısım - Saat) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 150
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 100
    halign = center
    valign = center
}

# --- DAKİKA (Alt Kısım - Dakika) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%M")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 150
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, -60
    halign = center
    valign = center
}

# --- TARİH ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A %d %b")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -160
    halign = center
    valign = center
}

# --- MEDYA BİLGİSİ (Spotify vb.) ---
label {
    monitor =
    # Spotify veya aktif oynatıcıdan şarkı bilgisini çeker
    text = cmd[update:1000] echo "<span> </span> $(playerctl metadata --format '{{title}} - {{artist}}' || echo 'No Music')"
    color = rgba(255, 255, 255, 0.6)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -200
    halign = center
    valign = center
}

# --- GİRİŞ ALANI (Input Field) ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.55
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1) # Yarı saydam arka plan
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = true
    placeholder_text = 
    hide_input = false
    check_color = rgba(255, 255, 255, 0.5)
    fail_color = rgba(255, 0, 0, 0.5)
    position = 0, -280
    halign = center
    valign = center
}