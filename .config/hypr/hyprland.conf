monitor = , preferred, auto, 1

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0

exec-once = systemctl --user start hyprpolkitagent
exec-once = waybar
exec-once = mako
exec-once = swayosd-server
exec-once = hypridle
exec-once = elephant
exec-once = walker --gapplication-service
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

input {
    kb_layout = tr
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    background_color = rgb(101010)
}

cursor {
    no_hardware_cursors = true
}

gesture = 3, horizontal, workspace

$mod = SUPER

bind = $mod, RETURN, exec, kitty
bind = $mod, SPACE, exec, walker
bind = $mod SHIFT, SPACE, exec, pkill -SIGUSR1 waybar
bind = $mod, B, exec, gtk-launch $(xdg-settings get default-web-browser)
bind = $mod, E, exec, xdg-open ~
bind = $mod, W, killactive
bind = $mod, F, fullscreen
bind = $mod, T, togglefloating
bind = $mod, L, exec, hyprlock
bind = $mod SHIFT, E, exit
bind = $mod, V, exec, sh -c 'cliphist decode "$(cliphist list | walker --dmenu)" | wl-copy'
bind = , PRINT, exec, sh -c 'grim - | swappy -f -'
bind = $mod SHIFT, S, exec, sh -c 'grim -g "$(slurp)" - | swappy -f -'

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindl = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

general {
    col.active_border = rgb(303463)
    col.inactive_border = rgb(1e2030)
    border_size = 2
    gaps_in = 5
    gaps_out = 10
}

decoration {
    rounding = 14
    active_opacity = 0.95
    inactive_opacity = 0.90

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }
}

animations {
    enabled = yes
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

group {
    col.border_active = rgb(303463)
    col.border_inactive = rgb(1e2030)
    groupbar {
        text_color = rgb(cdd6f4)
        col.active = rgb(303463)
        col.inactive = rgb(1e2030)
    }
}
